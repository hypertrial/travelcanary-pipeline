version: 2

updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      compatible-updates:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: dbt-core
        versions:
          - ">=1.12"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      compatible-updates:
        update-types:
          - minor
          - patch
